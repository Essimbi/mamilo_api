services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mamilo-api
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - mamilo-network

  db:
    image: mysql:8.0
    container_name: mamilo-db
    restart: unless-stopped
    tty: true
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: blog_mamilo
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
    volumes:
      - ./docker/mysql:/var/lib/mysql
    networks:
      - mamilo-network

  redis:
    image: redis:alpine
    container_name: mamilo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - mamilo-network

networks:
  mamilo-network:
    driver: bridge
